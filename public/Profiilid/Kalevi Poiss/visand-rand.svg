<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Ilma SVG-filtriteta: feTurbulence/feDisplacementMap ei renderdu
       iOS Safaris <img> sees ja teos jäi tühjaks. Võbin on joonte sees. -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8d9b8"/>
      <stop offset="0.55" stop-color="#dcc9a4"/>
      <stop offset="1" stop-color="#cbb491"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5f7d84"/>
      <stop offset="0.6" stop-color="#48626c"/>
      <stop offset="1" stop-color="#3a4f5a"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c8a67c"/>
      <stop offset="1" stop-color="#a9824f"/>
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#sky)"/>

  <!-- madal päike -->
  <ellipse cx="588" cy="120" rx="88" ry="62" fill="#f4e6c2" opacity="0.85"/>
  <ellipse cx="558" cy="142" rx="152" ry="35" fill="#e9d3a4" opacity="0.5"/>
  <ellipse cx="600" cy="112" rx="46" ry="38" fill="#f9efd3" opacity="0.9"/>

  <!-- meri vabakäe servaga -->
  <path d="M-30 262 C 40 254 110 246 190 250 C 260 254 320 242 400 250 C 470 257 540 244 610 250 C 680 256 740 246 830 252 L 830 424 L -30 424 Z" fill="url(#sea)"/>
  <path d="M-30 272 C 70 262 170 256 260 262 C 350 268 420 256 500 262 C 590 268 700 258 830 264" fill="none" stroke="#8fa9ab" stroke-width="10" stroke-linecap="round" opacity="0.55"/>
  <path d="M210 290 C 230 286 256 285 278 288" fill="none" stroke="#a7bcb8" stroke-width="6" stroke-linecap="round" opacity="0.45"/>
  <path d="M-30 324 C 90 312 200 306 300 314 C 400 322 470 306 560 314 C 660 322 740 310 830 316" fill="none" stroke="#2e444f" stroke-width="13" stroke-linecap="round" opacity="0.4"/>
  <path d="M596 344 C 618 340 642 340 662 343" fill="none" stroke="#31505c" stroke-width="7" stroke-linecap="round" opacity="0.5"/>
  <path d="M-30 374 C 100 362 220 358 330 366 C 440 374 520 358 620 368 C 700 374 770 364 830 370" fill="none" stroke="#d8e2d9" stroke-width="7" stroke-linecap="round" opacity="0.6"/>

  <!-- liivarand -->
  <path d="M-30 410 C 120 398 260 392 390 398 C 520 404 660 392 830 402 L 830 620 L -30 620 Z" fill="url(#sand)"/>
  <path d="M-30 432 C 110 420 250 416 370 422 C 500 428 660 418 830 428" fill="none" stroke="#e4c793" stroke-width="15" stroke-linecap="round" opacity="0.5"/>
  <path d="M120 472 C 240 460 380 456 500 462 C 580 466 640 462 700 468" fill="none" stroke="#8a6538" stroke-width="8" stroke-linecap="round" opacity="0.35"/>

  <!-- punane paat -->
  <g>
    <path d="M418 248 q 36 -27 68 -2 q -19 11 -31 9 q -21 15 -37 -7 z" fill="#b03c22" opacity="0.9"/>
    <path d="M452 240 l 4 -34 l 6 2 l -2 34 z" fill="#2c2420" opacity="0.8"/>
    <path d="M448 208 q 22 4 20 20 l -20 -6 z" fill="#e7e2d2" opacity="0.9"/>
    <ellipse cx="452" cy="266" rx="44" ry="7" fill="#22333d" opacity="0.3"/>
  </g>

  <!-- ajupuu ja rohutuust -->
  <g opacity="0.85">
    <path d="M96 402 q 8 -44 4 -78 q 14 30 10 78 z" fill="#5d5340"/>
    <path d="M100 330 q -20 -18 -24 -40 q 22 8 30 34 z" fill="#6c6047"/>
    <path d="M102 330 q 18 -22 38 -26 q -10 24 -32 34 z" fill="#7a6c50"/>
