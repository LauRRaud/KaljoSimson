<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="Soft vintage paper texture">
  <defs>
    <linearGradient id="paperBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f4ea"/>
      <stop offset="0.48" stop-color="#efe9dc"/>
      <stop offset="1" stop-color="#e3dacb"/>
    </linearGradient>
    <radialGradient id="centerLight" cx="50%" cy="42%" r="68%">
      <stop offset="0" stop-color="#fffdf6" stop-opacity="0.62"/>
      <stop offset="0.5" stop-color="#fff8eb" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#b59f83" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="edgeTone" cx="50%" cy="50%" r="74%">
      <stop offset="0.62" stop-color="#6f5942" stop-opacity="0"/>
      <stop offset="0.86" stop-color="#6f5942" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#5d4935" stop-opacity="0.18"/>
    </radialGradient>
    <filter id="paperNoise" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.72 0.46" numOctaves="4" seed="17"/>
      <feColorMatrix type="matrix" values="
        0.22 0 0 0 0.48
        0 0.22 0 0 0.45
        0 0 0.22 0 0.38
        0 0 0 0.23 0"/>
    </filter>
    <filter id="fiberNoise" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.92" numOctaves="2" seed="29"/>
      <feColorMatrix type="matrix" values="
        0.2 0 0 0 0.62
        0 0.2 0 0 0.58
        0 0 0.2 0 0.5
        0 0 0 0.16 0"/>
    </filter>
    <pattern id="fineFibers" width="180" height="120" patternUnits="userSpaceOnUse">
      <path d="M8 18c22-8 44 7 72-1s51-15 91-4" fill="none" stroke="#8d765e" stroke-opacity="0.08" stroke-width="1"/>
      <path d="M-12 72c31 10 53-6 92 3 29 7 56 3 105-10" fill="none" stroke="#fffdf7" stroke-opacity="0.16" stroke-width="1"/>
      <path d="M28 104c26-4 54 8 83-1 21-7 39-10 67-1" fill="none" stroke="#80694f" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <linearGradient id="softDeckle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#78634d" stop-opacity="0.12"/>
      <stop offset="0.08" stop-color="#78634d" stop-opacity="0"/>
      <stop offset="0.92" stop-color="#78634d" stop-opacity="0"/>
      <stop offset="1" stop-color="#78634d" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#paperBase)"/>
  <rect width="1920" height="1080" fill="url(#centerLight)"/>
  <rect width="1920" height="1080" filter="url(#paperNoise)" opacity="0.5"/>
  <rect width="1920" height="1080" filter="url(#fiberNoise)" opacity="0.38"/>
  <rect width="1920" height="1080" fill="url(#fineFibers)" opacity="0.72"/>
  <rect width="1920" height="1080" fill="url(#softDeckle)"/>
  <rect width="1920" height="1080" fill="url(#edgeTone)"/>
</svg>
