services:
  beyondframes-postgres:
    image: postgres:16-alpine
    container_name: beyondframes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: beyondframes
      POSTGRES_USER: beyondframes
      POSTGRES_PASSWORD: beyondframes
    ports:
      - "5433:5432"
    volumes:
      - beyondframes-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beyondframes -d beyondframes"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  beyondframes-postgres-data:
